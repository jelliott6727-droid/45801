<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Class Discussion Board</title>

<style>
body { margin:0; font-family: Arial; background:#eef2f7; }

header {
  background:#4a6cf7;
  color:white;
  padding:12px;
  text-align:center;
}

#toolbar {
  display:flex;
  gap:10px;
  padding:10px;
  background:white;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input {
  padding:8px;
}

button {
  padding:8px 12px;
  background:#4a6cf7;
  color:white;
  border:none;
  cursor:pointer;
}

#board {
  position:relative;
  height:calc(100vh - 110px);
}

.note {
  position:absolute;
  width:220px;
  background:#fff8a6;
  padding:10px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.delete {
  float:right;
  color:red;
  cursor:pointer;
}

.vote {
  margin-top:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>Class Discussion Board</header>

<div id="toolbar">
  <input id="name" placeholder="Your name">
  <input id="text" placeholder="Your idea">
  <button onclick="addNote()">Add</button>
  <button onclick="clearBoard()">Clear Board</button>
</div>

<div id="board"></div>

<!-- ✅ CORRECT Firebase scripts -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBT9AN4Xmfq0bkfNPZnSstICHQibMgQQA8",
  authDomain: "class-board-45801.firebaseapp.com",
  databaseURL: "https://class-board-45801-default-rtdb.firebaseio.com",
  projectId: "class-board-45801",
  storageBucket: "class-board-45801.firebasestorage.app",
  messagingSenderId: "7854244672",
  appId: "1:7854244672:web:aa834f4109b9364c8b30a5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function addNote() {
  const name = document.getElementById("name").value;
  const text = document.getElementById("text").value;

  if(!name || !text) return alert("Fill fields");

  db.ref("notes").push({
    name,
    text,
    x:200 + Math.random()*200,
    y:150 + Math.random()*150,
    votes:0
  });

  document.getElementById("text").value="";
}

// ✅ LISTENERS (ALL THREE — THIS FIXES YOUR ISSUE)
db.ref("notes").on("child_added", snap => render(snap.key, snap.val()));

db.ref("notes").on("child_changed", snap=>{
  const old = document.getElementById(snap.key);
  if(old) old.remove();
  render(snap.key, snap.val());
});

db.ref("notes").on("child_removed", snap=>{
  const el = document.getElementById(snap.key);
  if(el) el.remove();
});

// ✅ RENDER FUNCTION
function render(id,data){
  const note = document.createElement("div");
  note.className="note";
  note.id=id;

  note.style.left = data.x+"px";
  note.style.top = data.y+"px";

  note.innerHTML = `
    <span class="delete" onclick="deleteNote('${id}', event)">×</span>
    <b>${data.name}</b>
    <div>${data.text}</div>
    <div class="vote" onclick="vote('${id}', ${data.votes})">
      👍 ${data.votes}
    </div>
  `;

  // ✅ CLEAN DRAG SYSTEM
  note.onmousedown = function(e){
    if(e.target.classList.contains("delete")) return;

    let shiftX = e.clientX - note.offsetLeft;
    let shiftY = e.clientY - note.offsetTop;

    function moveAt(pageX, pageY){
      note.style.left = pageX - shiftX + "px";
      note.style.top = pageY - shiftY + "px";
    }

    function onMouseMove(e){
      moveAt(e.pageX, e.pageY);
    }

    document.addEventListener("mousemove", onMouseMove);

    document.addEventListener("mouseup", function onMouseUp(){
      document.removeEventListener("mousemove", onMouseMove);

      db.ref("notes/"+id).update({
        x: note.offsetLeft,
        y: note.offsetTop
      });

      document.removeEventListener("mouseup", onMouseUp);
    });
  };

  document.getElementById("board").appendChild(note);
}

// ✅ DELETE (NO PASSWORD)
function deleteNote(id, event){
  event.stopPropagation();
  db.ref("notes/"+id).remove();
}

// ✅ VOTE
function vote(id,v){
  db.ref("notes/"+id).update({votes:v+1});
}

// ✅ CLEAR BOARD
function clearBoard(){
  if(confirm("Clear all posts?")){
    db.ref("notes").remove();
  }
}
</script>

</body>
</html>
