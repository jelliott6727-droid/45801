<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Class Discussion Board</title>

<style>
body { margin:0; font-family: Arial; background:#eef2f7; }

header {
  background:#4a6cf7;
  color:white;
  padding:12px;
  text-align:center;
}

#toolbar {
  display:flex;
  gap:10px;
  padding:10px;
  background:white;
}

#board {
  position:relative;
  height:calc(100vh - 120px);
}

.note {  
  position:absolute;  
  width:240px;  
  background:white;  
  padding:12px;  
  border-radius:16px;  
  box-shadow:0 6px 18px rgba(0,0,0,0.15);  
  cursor:move;  
  transition: transform 0.15s ease, box-shadow 0.15s ease;}.note:hover 
  {  transform: scale(1.03);  box-shadow:0 10px 25px rgba(0,0,0,0.2);}

.delete {
  float:right;
  cursor:pointer;
  color:red;
}

.vote {
  cursor:pointer;
  margin-top:5px;
}
</style>
</head>

<body>

<header>Class Discussion Board</header>

<div id="toolbar">
  <input id="name" placeholder="Your name">
  <input id="text" placeholder="Your idea">
   <button onclick="addNote()">Add</button>  
  <button onclick="clearBoard()">Clear Board</button>
</div>

<div id="board"></div>

<!-- ✅ FIXED script links -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
// ✅ YOUR CONFIG (already inserted)
const firebaseConfig = {
  apiKey: "AIzaSyBT9AN4Xmfq0bkfNPZnSstICHQibMgQQA8",
  authDomain: "class-board-45801.firebaseapp.com",
  databaseURL: "https://class-board-45801-default-rtdb.firebaseio.com",
  projectId: "class-board-45801",
  storageBucket: "class-board-45801.firebasestorage.app",
  messagingSenderId: "7854244672",
  appId: "1:7854244672:web:aa834f4109b9364c8b30a5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔐 Set your instructor password here
  // <-- change this!

function addNote() {
  const name = document.getElementById("name").value;
  const text = document.getElementById("text").value;

  if(!name || !text) return alert("Fill in both fields");

  db.ref("notes").push({
    name,
    text,
    x:200 + Math.random()*200,
    y:150 + Math.random()*150,
    votes:0
  });

  document.getElementById("text").value = "";
}

db.ref("notes").on("child_added", snap => render(snap.key, snap.val()));
db.ref("notes").on("child_changed", snap=>{
  const old = document.getElementById(snap.key);
  if (old) old.remove();
  render(snap.key, snap.val());
});

function render(id, data){
  const note = document.createElement("div");
  note.className="note";
  note.id=id;
  note.style.left=data.x+"px";
  note.style.top=data.y+"px";

  note.innerHTML = `
    <span class="delete" onclick="event.stopPropagation(); del('${id}')">×</span>
    <b>${data.name}</b>
    <div>${data.text}</div>
    <div class="vote" onclick="vote('${id}',${data.votes})">
      👍 ${data.votes}
    </div>
  `;

  // drag (updates position live)
note.onmousedown = function(e) {

  // ✅ Prevent dragging when clicking delete button
  if (e.target.classList.contains("delete")) return;

  let shiftX = e.clientX - note.offsetLeft;
  let shiftY = e.clientY - note.offsetTop;

  function moveAt(pageX, pageY) {
    note.style.left = pageX - shiftX + 'px';
    note.style.top = pageY - shiftY + 'px';
  }

  function onMouseMove(e) {
    moveAt(e.pageX, e.pageY);
  }

  document.addEventListener('mousemove', onMouseMove);

  document.addEventListener('mouseup', function onMouseUp(e) {
    document.removeEventListener('mousemove', onMouseMove);

    // ✅ Save final position to Firebase ONLY after drag ends
    db.ref("notes/" + id).update({
      x: note.offsetLeft,
      y: note.offsetTop
    });

    document.removeEventListener('mouseup', onMouseUp);
  });
};

  document.getElementById("board").appendChild(note);
}

function vote(id,v){
  db.ref("notes/"+id).update({votes:v+1});
}

// 🔐 Instructor-only delete
function del(id){  db.ref("notes/"+id).remove();}

  function clearBoard(){  if(confirm("Clear all posts?")){    db.ref("notes").remove();  }}
  
</script>

</body>
</html>
